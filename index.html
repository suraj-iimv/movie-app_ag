<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Movie Search</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header class="app-header flex items-center justify-between px-6 py-4">
        <h1 class="text-xl font-semibold gradient-text">Movie AI</h1>
        <button id="theme-toggle" class="btn btn-icon" title="Toggle Light/Dark Mode">
            <svg id="theme-icon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path id="moon-path" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path>
                <path id="sun-path" class="hidden" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.364 17.636l-.707.707M6.364 6.364l-.707.707m12.728 12.728l-.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path>
            </svg>
        </button>
    </header>

    <main class="main-container flex flex-col items-center justify-center min-h-screen-center px-4 w-full">
        
        <div class="search-section w-full max-w-2xl flex flex-col items-center">
            <h2 class="text-3xl md:text-4xl font-medium mb-6 text-center">What movie are you looking for?</h2>
            
            <div class="search-box w-full relative">
                <svg class="search-icon absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
                <input type="text" id="movie-search-input" class="search-input w-full pl-12 pr-4 py-4 rounded-xl text-lg bg-gray-800 text-white border border-gray-700 focus:outline-none focus:border-indigo-500 transition-colors" placeholder="e.g., Inception, The Matrix..." autocomplete="off">
                <div id="suggestions-dropdown" class="suggestions-dropdown hidden"></div>
            </div>
            <p id="error-message" class="text-red-400 mt-3 text-sm hidden"></p>
        </div>

        <div id="results-container" class="results-section w-full max-w-2xl mt-8 hidden">
            <!-- Loading Skeleton -->
            <div id="loading-skeleton" class="movie-card flex flex-col gap-4 hidden">
                <div class="skeleton h-8 w-3/4 rounded"></div>
                <div class="flex gap-2">
                    <div class="skeleton h-6 w-16 rounded-full"></div>
                    <div class="skeleton h-6 w-32 rounded-full"></div>
                </div>
                <div class="skeleton h-4 w-full rounded mt-2"></div>
                <div class="skeleton h-4 w-5/6 rounded"></div>
                <div class="skeleton h-4 w-4/6 rounded"></div>
                
                <div class="mt-4">
                    <div class="skeleton h-5 w-24 rounded mb-2"></div>
                    <div class="flex gap-2 flex-wrap">
                        <div class="skeleton h-6 w-20 rounded-full"></div>
                        <div class="skeleton h-6 w-24 rounded-full"></div>
                        <div class="skeleton h-6 w-16 rounded-full"></div>
                    </div>
                </div>
            </div>

            <!-- Movie Content -->
            <div id="movie-content" class="movie-card flex flex-col gap-4 hidden fade-in">
                <div class="flex justify-between items-start flex-wrap gap-2">
                    <h2 id="movie-title" class="text-2xl font-semibold text-white"></h2>
                    <div class="flex gap-2 items-center">
                        <span id="movie-rating" class="badge badge-accent"></span>
                        <span id="movie-year" class="badge badge-outline"></span>
                    </div>
                </div>
                
                <div class="movie-meta text-gray-400 text-sm">
                    <span>Directed by </span>
                    <span id="movie-director" class="font-medium text-gray-200"></span>
                </div>

                <div class="movie-plot mt-2 text-gray-300 leading-relaxed" id="movie-plot">
                </div>

                <div class="movie-cast mt-4">
                    <h3 class="text-sm font-medium text-gray-400 mb-2 uppercase tracking-wider">Top Cast</h3>
                    <div id="movie-cast-list" class="flex flex-wrap gap-2">
                        <!-- Cast tags inserted here -->
                    </div>
                </div>

                <div class="movie-similar mt-6 border-t border-gray-700 pt-4">
                    <h3 class="text-sm font-medium text-gray-400 mb-2 uppercase tracking-wider">Similar Movies</h3>
                    <div id="movie-similar-list" class="flex flex-wrap gap-2">
                        <!-- Similar movies inserted here -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
